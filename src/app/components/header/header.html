<header class="header">
  <div class="header-content">
    <a class="logo" routerLink="/">
      <i class="pi pi-shopping-bag"></i>
      <span>{{ brand.appName }}</span>
    </a>

    <nav class="nav-menu">
      <p-button
        label="Accueil"
        icon="pi pi-home"
        text
        routerLink="/"
        routerLinkActive="active-nav"
      ></p-button>
      <p-button
        label="Produits"
        icon="pi pi-list"
        text
        routerLink="/products"
        routerLinkActive="active-nav"
      ></p-button>
      <p-button
        label="Nouveau produit"
        icon="pi pi-plus"
        text
        routerLink="/product-form"
        routerLinkActive="active-nav"
      ></p-button>
    </nav>

    <div class="user-menu">
      <div class="user-avatar" [attr.aria-label]="'Compte utilisateur'">
        <i class="pi pi-user"></i>
      </div>
    </div>
  </div>
</header>
